<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 AI 智能面试官</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; }
    .header-controls { display: flex; gap: 10px; }
    .control-btn {
      padding: 8px 16px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
    }
    .control-btn:hover, .control-btn.active {
      background: white;
      color: #1976d2;
      border-color: white;
    }
    .tabs {
      display: flex;
      background: #f5f5f5;
      border-bottom: 1px solid #eee;
    }
    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 14px;
      color: #666;
      transition: all 0.3s;
    }
    .tab.active {
      background: white;
      color: #1976d2;
      font-weight: 600;
    }
    .tab:hover:not(.active) { background: #eee; }
    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }
    .chat-container {
      height: 400px;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }
    .message {
      margin-bottom: 16px;
      display: flex;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .message-content {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .message-content {
      background: #1976d2;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .message-content {
      background: white;
      color: #333;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .message.system .message-content {
      background: #fff3e0;
      color: #e65100;
      border-radius: 8px;
      font-size: 13px;
      max-width: 100%;
    }
    .typing { display: flex; align-items: center; gap: 8px; color: #666; font-style: italic; }
    .typing-dot {
      width: 8px; height: 8px;
      background: #666;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #eee;
    }
    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      resize: none;
      font-size: 15px;
      line-height: 1.5;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #1976d2; }
    button {
      padding: 12px 20px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    button:hover { background: #1565c0; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.secondary {
      background: #ff9800;
    }
    button.secondary:hover { background: #f57c00; }
    button.danger {
      background: #f44336;
    }
    button.danger:hover { background: #d32f2f; }
    .voice-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .voice-btn.recording {
      background: #f44336;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .resume-upload {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      background: #fafafa;
      transition: all 0.3s;
    }
    .resume-upload:hover { border-color: #1976d2; background: #f0f7ff; }
    .resume-upload.dragover { border-color: #1976d2; background: #e3f2fd; }
    .resume-upload input { display: none; }
    .resume-upload label {
      cursor: pointer;
      display: block;
    }
    .resume-upload .icon { font-size: 48px; margin-bottom: 16px; }
    .resume-upload .text { color: #666; margin-bottom: 8px; }
    .resume-upload .hint { font-size: 12px; color: #999; }
    .resume-content {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
    }
    .resume-content h4 { color: #1976d2; margin-bottom: 12px; }
    .resume-content pre { white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
    .report-container {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 20px;
      max-height: 400px;
      overflow-y: auto;
    }
    .report-container pre {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.8;
    }
    .status-bar {
      padding: 10px 20px;
      background: #f5f5f5;
      font-size: 12px;
      color: #666;
      display: flex;
      justify-content: space-between;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .shortcuts {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .shortcut-btn {
      padding: 6px 12px;
      background: #e3f2fd;
      color: #1976d2;
      border: none;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
    }
    .shortcut-btn:hover { background: #bbdefb; }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    .toggle input:checked + .toggle-slider { background: #1976d2; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
    .toggle-label { font-size: 13px; color: #666; }
    
    /* ========== 移动端适配 ========== */
    @media screen and (max-width: 768px) {
      body {
        padding: 0;
        min-height: 100vh;
      }
      
      .container {
        max-width: 100%;
        border-radius: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      .header {
        padding: 12px 16px;
        flex-shrink: 0;
      }
      
      .header h1 {
        font-size: 18px;
      }
      
      .header p {
        display: none;
      }
      
      .header-controls {
        gap: 6px;
      }
      
      .control-btn {
        padding: 6px 10px;
        font-size: 11px;
        border-radius: 16px;
      }
      
      .tabs {
        flex-shrink: 0;
      }
      
      .tab {
        padding: 12px 8px;
        font-size: 13px;
      }
      
      .tab-content {
        padding: 12px;
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      
      .tab-content.active {
        display: flex;
      }
      
      .toggle-row {
        margin-bottom: 8px;
        flex-shrink: 0;
      }
      
      .toggle-label {
        font-size: 12px;
      }
      
      .chat-container {
        flex: 1;
        min-height: 0;
        height: auto;
        padding: 12px;
        margin: 0 -12px;
      }
      
      .message-content {
        max-width: 85%;
        padding: 10px 14px;
        font-size: 14px;
      }
      
      .input-area {
        padding: 12px;
        flex-shrink: 0;
      }
      
      .input-row {
        gap: 8px;
      }
      
      textarea {
        font-size: 16px; /* 防止iOS缩放 */
        padding: 10px 14px;
        min-height: 44px;
        max-height: 120px;
      }
      
      #sendBtn {
        padding: 10px 14px;
        font-size: 13px;
      }
      
      .voice-btn {
        width: 44px;
        height: 44px;
        font-size: 18px;
        flex-shrink: 0;
      }
      
      .shortcuts {
        margin-top: 8px;
        gap: 6px;
      }
      
      .shortcut-btn {
        padding: 6px 10px;
        font-size: 11px;
      }
      
      /* 简历上传页面 */
      .resume-upload {
        padding: 24px;
        flex-shrink: 0;
      }
      
      .resume-upload .icon {
        font-size: 36px;
        margin-bottom: 12px;
      }
      
      .resume-upload .text {
        font-size: 14px;
      }
      
      .resume-content {
        flex: 1;
        min-height: 0;
        margin-top: 12px;
        padding: 12px;
      }
      
      .resume-content pre {
        font-size: 13px;
      }
      
      #resumeText {
        font-size: 14px;
        min-height: 100px;
      }
      
      /* 评估报告页面 */
      #report {
        padding: 12px;
      }
      
      #report > div:first-child {
        flex-wrap: wrap;
      }
      
      #report button {
        flex: 1;
        min-width: 45%;
        font-size: 13px;
        padding: 10px 14px;
      }
      
      .report-container {
        flex: 1;
        min-height: 0;
        max-height: none;
        padding: 12px;
        margin: 0 -12px;
      }
      
      .report-container pre {
        font-size: 13px;
        line-height: 1.6;
      }
      
      .status-bar {
        padding: 8px 12px;
        font-size: 11px;
        flex-shrink: 0;
      }
    }
    
    /* 小屏幕手机优化 */
    @media screen and (max-width: 375px) {
      .header h1 {
        font-size: 16px;
      }
      
      .control-btn {
        padding: 5px 8px;
        font-size: 10px;
      }
      
      .message-content {
        max-width: 90%;
        padding: 8px 12px;
        font-size: 13px;
      }
      
      .shortcut-btn {
        padding: 5px 8px;
        font-size: 10px;
      }
    }
    
    /* 横屏模式适配 */
    @media screen and (max-height: 500px) and (orientation: landscape) {
      .container {
        flex-direction: row;
      }
      
      .header {
        width: 60px;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        padding: 20px 12px;
        flex-direction: column;
        justify-content: flex-start;
      }
      
      .header h1 {
        font-size: 16px;
        writing-mode: vertical-rl;
      }
      
      .header p {
        display: none;
      }
      
      .header-controls {
        flex-direction: column;
        margin-top: 20px;
      }
      
      .control-btn {
        writing-mode: horizontal-tb;
        padding: 8px 12px;
        font-size: 11px;
      }
      
      .tabs {
        flex-direction: column;
        width: 60px;
        border-bottom: none;
        border-right: 1px solid #eee;
      }
      
      .tab {
        padding: 15px 8px;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        border-bottom: 1px solid #eee;
      }
      
      .chat-container {
        height: 100%;
      }
      
      .input-area {
        width: 100%;
      }
    }
    
    /* 安全区域适配（iPhone X及以上） */
    @supports (padding: env(safe-area-inset-bottom)) {
      .input-area {
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
      
      .status-bar {
        padding-left: calc(20px + env(safe-area-inset-left));
        padding-right: calc(20px + env(safe-area-inset-right));
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🎯 AI 智能面试官</h1>
        <p style="opacity:0.9;font-size:13px;margin-top:4px">基于 DeepSeek + 语音AI 的专业面试助手</p>
      </div>
      <div class="header-controls">
        <button class="control-btn" id="voiceModeBtn" onclick="toggleVoiceMode()">🎤 语音模式</button>
        <button class="control-btn" id="textModeBtn" onclick="toggleTextMode()">📝 文字模式</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="interview">💬 面试</button>
      <button class="tab" data-tab="resume">📄 上传简历</button>
      <button class="tab" data-tab="report">📊 评估报告</button>
    </div>

    <!-- 面试Tab -->
    <div id="interview" class="tab-content active">
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="voiceOutputToggle" checked>
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">🔊 面试官回答自动播放语音</span>
      </div>
      <div id="chat" class="chat-container"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea id="input" rows="2" placeholder="输入你的回答，或点击🎤开始语音输入..."></textarea>
          <button id="sendBtn" onclick="sendMessage()">发送</button>
          <button id="voiceBtn" class="voice-btn" onclick="toggleRecording()">🎤</button>
        </div>
        <div class="shortcuts">
          <button class="shortcut-btn" onclick="insertShortcut('读出来')">🔊 读出来</button>
          <button class="shortcut-btn" onclick="insertShortcut('结束面试')">📋 结束面试</button>
          <button class="shortcut-btn" onclick="switchTab('resume')">📄 上传简历</button>
        </div>
      </div>
    </div>

    <!-- 简历Tab -->
    <div id="resume" class="tab-content">
      <div class="resume-upload" id="resumeDropZone">
        <input type="file" id="resumeFile" accept=".txt,.md,.pdf,.doc,.docx" onchange="handleResumeUpload(this.files[0])">
        <label for="resumeFile">
          <div class="icon">📄</div>
          <div class="text">点击或拖拽上传简历</div>
          <div class="hint">支持 TXT, MD, PDF, Word 格式</div>
        </label>
      </div>
      <div id="resumeContent" class="resume-content" style="display:none;">
        <h4>📋 简历分析结果</h4>
        <pre id="resumeAnalysis"></pre>
      </div>
      <div style="margin-top:20px;">
        <label style="font-weight:600;display:block;margin-bottom:8px;">或者直接粘贴简历内容：</label>
        <textarea id="resumeText" rows="6" style="width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;resize:none;font-family:inherit;" placeholder="粘贴你的简历内容..."></textarea>
        <button onclick="analyzeResumeText()" style="margin-top:12px;">🔍 分析简历</button>
      </div>
    </div>

    <!-- 评估报告Tab -->
    <div id="report" class="tab-content">
      <div style="margin-bottom:16px;display:flex;gap:12px;">
        <button onclick="generateReport()" style="background:#ff9800;">📊 生成评估报告</button>
        <button onclick="downloadReport()" id="downloadBtn" disabled style="background:#4caf50;">💾 下载报告</button>
      </div>
      <div id="reportContent" class="report-container">
        <p style="color:#999;text-align:center;">点击"生成评估报告"按钮获取面试评估结果</p>
      </div>
    </div>

    <div class="status-bar">
      <span><span class="status-dot"></span><span id="statusText">服务正常</span></span>
      <span id="tokenCount">消息数: 0</span>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/v1/chat/completions';
    const STREAM_API_URL = 'http://localhost:5000/stream_run';
    
    let conversationHistory = [];
    let currentReport = '';
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let voiceMode = false;
    let audioContext = null;
    let speechRecognition = null;

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const voiceBtn = document.getElementById('voiceBtn');

    // Tab切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });

    function switchTab(tabId) {
      document.querySelector(`[data-tab="${tabId}"]`).click();
    }

    // 添加消息
    function addMessage(content, role, isSystem = false) {
      const div = document.createElement('div');
      div.className = `message ${role}${isSystem ? ' system' : ''}`;
      div.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = `
        <div class="message-content typing">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          面试官思考中...
        </div>
      `;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 发送消息
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      conversationHistory.push({ role: 'user', content: text });
      updateTokenCount();
      
      // 检查是否需要生成报告
      const needReport = ['结束面试', '生成报告', '面试结束'].some(cmd => text.includes(cmd));
      if (needReport) {
        await generateAndShowReport();
        return;
      }

      // 检查是否需要读出来
      const needRead = ['读出来', '播放', '语音'].some(cmd => text.includes(cmd));
      const readVoice = needRead && !text.includes('面试');

      showTyping();

      try {
        const response = await fetch(STREAM_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: conversationHistory.map(m => ({
              type: m.role === 'assistant' ? 'ai' : 'human',
              content: m.content
            }))
          })
        });

        removeTyping();
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let assistantMessage = '';

        const msgDiv = addMessage('', 'assistant');
        const contentDiv = msgDiv.querySelector('.message-content');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          assistantMessage += decoder.decode(value);
          contentDiv.textContent = assistantMessage;
          chat.scrollTop = chat.scrollHeight;
        }

        conversationHistory.push({ role: 'assistant', content: assistantMessage });
        updateTokenCount();

        // 检查是否需要语音播放
        const shouldPlay = document.getElementById('voiceOutputToggle').checked && !readVoice;
        if (shouldPlay) {
          await playTextAsSpeech(assistantMessage);
        }

      } catch (error) {
        removeTyping();
        addMessage(`❌ 服务暂时不可用，请检查服务是否启动。`, 'assistant', true);
      }
    }

    // 语音识别
    async function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = processRecording;

        mediaRecorder.start();
        isRecording = true;
        voiceBtn.classList.add('recording');
        voiceBtn.textContent = '⏹';
        
        addMessage('🎤 正在录音...（说完后点击停止）', 'system', true);
      } catch (err) {
        addMessage('❌ 无法访问麦克风，请检查权限设置', 'system', true);
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
      }
    }

    async function processRecording() {
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      
      reader.onloadend = () => {
        const base64 = reader.result.split(',')[1];
        // 直接将base64转为文本（这里简化处理，实际应该调用ASR API）
        addMessage('[语音消息已发送]', 'user');
        sendMessage();
      };
      reader.readAsDataURL(audioBlob);
    }

    // 文字转语音
    async function playTextAsSpeech(text) {
      try {
        const response = await fetch('http://localhost:5000/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text })
        });
        
        if (response.ok) {
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          audio.play();
        }
      } catch (err) {
        console.log('TTS not available, skipping audio');
      }
    }

    // 简历上传
    async function handleResumeUpload(file) {
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = async (e) => {
        const content = e.target.result;
        document.getElementById('resumeText').value = content;
        await analyzeResumeText();
      };
      reader.readAsText(file);
    }

    async function analyzeResumeText() {
      const resumeText = document.getElementById('resumeText').value.trim();
      if (!resumeText) {
        alert('请先上传简历或粘贴简历内容');
        return;
      }

      addMessage('正在分析简历，请稍候...', 'system', true);
      
      try {
        // 这里应该调用后端API分析简历
        // 简化处理：将简历内容作为消息发送给Agent
        addMessage('📄 已收到简历，开始分析...', 'system', true);
        
        conversationHistory.push({
          role: 'user',
          content: `请分析以下简历并开始面试：\n\n${resumeText}`
        });
        
        // 自动开始面试
        await sendMessage();
        
        // 切换回面试页面
        switchTab('interview');
        
      } catch (error) {
        addMessage('❌ 简历分析失败，请稍后重试', 'system', true);
      }
    }

    // 生成报告
    async function generateAndShowReport() {
      addMessage('正在生成面试评估报告...', 'system', true);
      
      try {
        const response = await fetch(STREAM_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              ...conversationHistory.map(m => ({
                type: m.role === 'assistant' ? 'ai' : 'human',
                content: m.content
              })),
              {
                type: 'human',
                content: '请根据以上面试对话生成一份详细的面试评估报告，包括技术能力评分、各维度评分、综合评价和改进建议。'
              }
            ]
          })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        currentReport = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          currentReport += decoder.decode(value);
        }

        // 显示报告
        document.getElementById('reportContent').innerHTML = `<pre>${escapeHtml(currentReport)}</pre>`;
        document.getElementById('downloadBtn').disabled = false;
        switchTab('report');
        
        addMessage('✅ 面试评估报告已生成！', 'system', true);

      } catch (error) {
        addMessage('❌ 报告生成失败，请稍后重试', 'system', true);
      }
    }

    function generateReport() {
      if (conversationHistory.length < 4) {
        addMessage('⚠️ 面试对话太少，请先进行完整的面试再生成报告', 'system', true);
        return;
      }
      generateAndShowReport();
    }

    function downloadReport() {
      if (!currentReport) return;
      
      const blob = new Blob([currentReport], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `面试评估报告_${new Date().toLocaleDateString()}.md`;
      a.click();
    }

    function toggleVoiceMode() {
      voiceMode = true;
      document.getElementById('voiceModeBtn').classList.add('active');
      document.getElementById('textModeBtn').classList.remove('active');
      document.getElementById('voiceOutputToggle').checked = true;
    }

    function toggleTextMode() {
      voiceMode = false;
      document.getElementById('textModeBtn').classList.add('active');
      document.getElementById('voiceModeBtn').classList.remove('active');
      document.getElementById('voiceOutputToggle').checked = false;
    }

    function insertShortcut(text) {
      input.value = text;
      input.focus();
    }

    function updateTokenCount() {
      document.getElementById('tokenCount').textContent = `消息数: ${Math.ceil(conversationHistory.length / 2)}`;
    }

    // 回车发送
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 拖拽上传
    const dropZone = document.getElementById('resumeDropZone');
    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleResumeUpload(e.dataTransfer.files[0]);
    });

    // 初始化
    addMessage('👋 你好！欢迎来到 AI 智能面试！\n\n我可以帮你进行专业的模拟面试练习，支持以下功能：\n• 💬 文字对话面试\n• 🎤 语音交流（点击麦克风开始）\n• 📄 简历智能分析\n• 📊 面试评估报告\n\n请告诉我你想面试的岗位和你的背景经验，比如：\n"我想面试 Python 后端开发，有 3 年经验"', 'assistant');
    conversationHistory.push({ 
      role: 'assistant', 
      content: '你好！欢迎来到 AI 智能面试！' 
    });
  </script>
</body>
</html>
